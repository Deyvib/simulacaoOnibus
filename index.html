<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>.leaflet-marker-icon {transition: all 0.1s linear;}</style>
  </head>
  <body style="display: flex; min-height: 100vh; margin: 0; justify-content: center;"> 
       <div id="map" style="width: 600px; height: 600px; align-self: center"></div>
  <script src="rota.js"></script>
    <script>
      const coordenadas = dadosDaRota.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
      // Inicializa o mapa
      const map = L.map("map").setView(coordenadas[0], 19);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
      // Cria o marcador
      let marcador = L.marker(coordenadas[0]).addTo(map);
      // Inicializa trajeto
      let trajetoesperado = L.polyline([coordenadas], {color: 'red', weight: '2', dashArray: '10, 10'}).addTo(map);
      let trajetoatual = L.polyline([coordenadas[0]], {color: 'blue', weight: '5'}).addTo(map);
      let indice = 0;
      function simularMovimento() {
        if (indice < coordenadas.length) {
        let proximoPonto = coordenadas[indice];
        marcador.setLatLng(proximoPonto);
        trajetoatual.addLatLng(proximoPonto);
        indice++;
        map.panTo(proximoPonto); // O mapa segue o ônibus
          }
        }
        setInterval(simularMovimento, 1000);
    </script>
  </body>
</html>
